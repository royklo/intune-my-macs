#
# Copilot setup steps — pre-installs the validation toolchain so the hosted
# GitHub Copilot coding agent starts from a reproducible environment.
# GitHub runs the job named `copilot-setup-steps` before an agent session;
# it is not part of normal CI (only workflow_dispatch otherwise).
name: Copilot setup steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install documentation-tool dependencies
        run: pip install -r tools/requirements.txt

      - name: Smoke-test the verify loop
        # pwsh, python3 and shellcheck are present on ubuntu runners; plutil is
        # macOS-only, so .mobileconfig falls back to an XML well-formedness check.
        run: pwsh -NoProfile -File ./scripts/verify.ps1
